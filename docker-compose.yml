services:

  ### NGINX Server ###
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${APP_CODE_PATH_HOST}:${APP_CODE_PATH_CONTAINER}
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - ./public:/usr/share/nginx/html:ro
    environment:
      - TZ=${TIMEZONE}
    networks:
      - app-network
    depends_on:
      - php-fpm

  ### PHP-FPM ###
  php-fpm:
    container_name: php-fpm
    build:
      context: ./php-fpm
      args:
        - PHP_VERSION=${PHP_VERSION}
    volumes:
      - ${APP_CODE_PATH_HOST}:${APP_CODE_PATH_CONTAINER}
      - ./php-fpm/local-dev.ini:/usr/local/etc/php/conf.d/local-dev.ini:ro
      - ./php-fpm/xlaravel.pool.conf:/usr/local/etc/php-fpm.d/xlaravel.pool.conf:ro
      - ./public:/usr/share/nginx/html:ro
    expose:
      - "9000"
    environment:
      - TZ=${TIMEZONE}
    networks:
      - app-network

  ### NODE CLI ###
  node-cli:
    container_name: node-cli
    image: node:${NODE_VERSION}-alpine
    working_dir: ${APP_CODE_PATH_CONTAINER}
    volumes:
      - ${APP_CODE_PATH_HOST}:${APP_CODE_PATH_CONTAINER}
    tty: true
    ports:
      - "3000:3000" # Port NextJS/Vue
      - "5173:5173" # Port Vite
    environment:
      - TZ=${TIMEZONE}
    networks:
      - app-network

  ### MySQL ###
  mysql:
    container_name: mysql
    image: mysql:${MYSQL_VERSION}
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=${TIMEZONE}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - app-network

  ### Adminer ###
  adminer:
    container_name: adminer
    image: adminer:standalone
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    ports:
      - "8081:8080"
    networks:
      - app-network
    depends_on:
      - mysql

  ### Redis ###
  redis:
    container_name: redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
